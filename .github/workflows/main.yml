name: JSM Deployment Gating Test

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    # This MUST match the environment name in .jira/config.yml
    # AND the GitHub Environment you'll create in the next step
    environment: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulated build
        run: |
          echo "Building application..."
          sleep 5

      - name: Simulated deploy
        run: |
          echo "Deploying to Production..."
          for i in {1..5}; do
            echo "Deploy step $i/5"
            sleep 3
          done
          echo "Deployment complete."
